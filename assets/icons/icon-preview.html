<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>GameHQ — Icon Preview</title>
<style>
  body { margin:0; font-family:"Segoe UI",sans-serif; background:#14161c; color:#e8eaf0; }
  h1 { font-size:20px; font-weight:600; margin:24px 32px 4px; }
  p  { margin:0 32px 24px; color:#9aa0ae; font-size:13px; }
  .row { display:flex; gap:32px; align-items:flex-end; padding:28px 32px; }
  .row.light { background:#eef0f4; }
  .cell { text-align:center; }
  .cell span { display:block; margin-top:8px; font-size:11px; color:#9aa0ae; }
  .row.light .cell span { color:#5a6070; }
  img { display:block; image-rendering:auto; }
</style>
</head>
<body>
  <h1>GameHQ app icon</h1>
  <p>Capture frame (viewfinder brackets) + play mark + record dot · dark console-tile background, violet→blue accent.</p>

  <div class="row">
    <div class="cell"><img src="gamehq.svg" width="256" height="256"><span>256</span></div>
    <div class="cell"><img src="gamehq.svg" width="128" height="128"><span>128</span></div>
    <div class="cell"><img src="gamehq.svg" width="64" height="64"><span>64</span></div>
    <div class="cell"><img src="gamehq.svg" width="48" height="48"><span>48</span></div>
    <div class="cell"><img src="gamehq.svg" width="32" height="32"><span>32</span></div>
    <div class="cell"><img src="gamehq.svg" width="16" height="16"><span>16</span></div>
  </div>

  <div class="row light">
    <div class="cell"><img src="gamehq.svg" width="128" height="128"><span>128 on light</span></div>
    <div class="cell"><img src="gamehq.svg" width="48" height="48"><span>48 on light</span></div>
    <div class="cell"><img src="gamehq.svg" width="24" height="24"><span>24 on light</span></div>
  </div>
</body>
</html>
